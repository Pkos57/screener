<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoScreener Pro · Сетка графиков</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e0e0e0; }
    .header { background: #141414; border-bottom: 1px solid #2a2a2a; padding: 12px 20px; display: flex; align-items: center; flex-wrap: wrap; gap: 16px; }
    .logo { font-weight: 600; font-size: 18px; color: #fff; }
    .logo span { color: #00bcd4; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { background: #1e1e1e; border: 1px solid #333; color: #aaa; padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.1s; }
    .filter-btn:hover { background: #2a2a2a; color: #fff; }
    .filter-btn.active { background: #00bcd4; color: #000; border-color: #00bcd4; }
    .filter-btn .count { background: #333; padding: 2px 6px; border-radius: 10px; font-size: 11px; }
    .settings { margin-left: auto; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    select, .sort-select, .volume-filter { background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
    .status-bar { padding: 8px 20px; background: #1a1a1a; font-size: 13px; color: #aaa; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; flex-wrap: wrap; align-items: center; }
    .refresh-btn, .alert-btn, .grid-settings-btn { background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 4px 12px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .refresh-btn:hover, .alert-btn:hover, .grid-settings-btn:hover { background: #2a2a2a; }
    .grid-container { 
      display: grid; 
      gap: 16px; 
      padding: 20px; 
      --grid-cols: repeat(auto-fill, minmax(340px, 1fr));
      grid-template-columns: var(--grid-cols);
    }
    .chart-card { background: #141414; border: 1px solid #2a2a2a; border-radius: 10px; overflow: hidden; transition: all 0.1s; }
    .signal-card { border-left: 4px solid #ffb300; }
    .chart-header { padding: 10px 12px; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
    .chart-symbol { font-weight: 600; color: #fff; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .chart-exchange { font-size: 11px; color: #666; background: #1e1e1e; padding: 2px 6px; border-radius: 4px; }
    .chart-price { font-family: monospace; font-weight: 500; }
    .positive { color: #00c853; } .negative { color: #ff5252; }
    .chart-change { font-size: 12px; padding: 3px 8px; border-radius: 4px; }
    .chart-change.positive { background: rgba(0,200,83,0.15); }
    .chart-change.negative { background: rgba(255,82,82,0.15); }
    .chart-body { height: 150px; position: relative; }
    .chart-footer { padding: 8px 12px; font-size: 11px; color: #888; border-top: 1px solid #222; }
    .metrics-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .metric-group { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .metric-badge { background: #1e1e1e; padding: 3px 8px; border-radius: 12px; font-size: 10px; color: #aaa; white-space: nowrap; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; transition: all 0.1s; border: 1px solid transparent; }
    .metric-badge:hover { background: #2a2a2a; border-color: #444; }
    .metric-badge.active-period { background: #2a4a4a; border-color: #00bcd4; color: #fff; }
    .metric-badge.positive { color: #00c853; }
    .metric-badge.negative { color: #ff5252; }
    .signal-badge { background: #ffb300; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-left: 6px; }
    .confidence { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
    .confidence-high { background: #00c853; }
    .confidence-medium { background: #ffb300; }
    .confidence-low { background: #ff5252; }
    .loading { text-align: center; padding: 40px; color: #666; }
    .spinner { width: 24px; height: 24px; border: 2px solid #333; border-top-color: #00bcd4; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #141414; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .tooltip { position: relative; border-bottom: 1px dotted #666; cursor: help; }
    /* Модальное окно алертов */
    .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; width: 550px; max-width: 90%; max-height: 85vh; overflow-y: auto; padding: 20px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-title { font-size: 18px; font-weight: 600; }
    .close-btn { background: none; border: none; color: #aaa; font-size: 24px; cursor: pointer; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
    .form-group input, .form-group select { width: 100%; background: #0e0e0e; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 6px; font-size: 13px; }
    .alert-item { background: #0e0e0e; border: 1px solid #333; border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .alert-item-info { font-size: 12px; }
    .alert-item-remove { color: #ff5252; cursor: pointer; }
    .btn-primary { background: #00bcd4; color: #000; border: none; padding: 10px 16px; border-radius: 6px; font-weight: 500; cursor: pointer; width: 100%; }
    .btn-secondary { background: #333; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    .alert-badge { background: #ffb300; color: #000; border-radius: 50%; width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; margin-left: 4px; }
    .period-selector { display: flex; gap: 4px; margin-left: auto; }
    .period-btn { background: #1e1e1e; border: 1px solid #333; color: #888; padding: 2px 6px; border-radius: 4px; font-size: 10px; cursor: pointer; }
    .period-btn.active { background: #00bcd4; color: #000; border-color: #00bcd4; }
  </style>
</head>

<script>
  (function(){
    "use strict";

    // ---------- КОНФИГУРАЦИЯ ----------
    const CONFIG = {
      chartHeight: 150,
      candlesCount: 100,
      defaultInterval: '15m',
      wsUrl: 'ws://localhost:8765',
      natrPeriod: 14,
      emaPeriods: [20, 50],
      storageKey: 'crypto_screener_settings',
      alertsStorageKey: 'crypto_alerts',
      metricsCacheTime: 60000
    };

    // ---------- УТИЛИТЫ ----------
    const Utils = {
      formatPrice: p => p === undefined ? '—' : p >= 1000 ? p.toFixed(2) : p >= 1 ? p.toFixed(4) : p >= 0.01 ? p.toFixed(6) : p.toFixed(8),
      formatChange: c => (c === undefined ? '0.00%' : (c>=0?'+':'') + c.toFixed(2) + '%'),
      formatVolume: v => !v ? '0' : v >= 1e9 ? (v/1e9).toFixed(1)+'B' : v >= 1e6 ? (v/1e6).toFixed(1)+'M' : v >= 1e3 ? (v/1e3).toFixed(1)+'K' : v.toFixed(0),
      formatNumber: n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : n.toFixed(0),
      saveSettings: (obj) => localStorage.setItem(CONFIG.storageKey, JSON.stringify(obj)),
      loadSettings: () => { try { return JSON.parse(localStorage.getItem(CONFIG.storageKey)) || {}; } catch(e) { return {}; } },
      playBeep: () => { try { new Audio('data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVoAAACAgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f38=').play(); } catch(e){} },
      requestNotificationPermission: async () => { if(Notification.permission === 'default') await Notification.requestPermission(); },
      showNotification: (title, body) => { if(Notification.permission === 'granted') new Notification(title, { body, icon: 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\'%3E%3Ctext x=\'2\' y=\'18\' font-size=\'18\'%3E🔔%3C/text%3E%3C/svg%3E' }); },
      debounce: (func, wait) => { let timeout; return (...args) => { clearTimeout(timeout); timeout = setTimeout(() => func.apply(this, args), wait); }; }
    };

    // ---------- РАСЧЁТ NATR ----------
    function calculateNATR(candles, period = 14) {
      if (!candles || candles.length < period + 1) return null;
      let trSum = 0;
      for (let i = candles.length - period; i < candles.length; i++) {
        const c = candles[i];
        const prevClose = i > 0 ? candles[i-1].close : c.open;
        const tr = Math.max(c.high - c.low, Math.abs(c.high - prevClose), Math.abs(c.low - prevClose));
        trSum += tr;
      }
      const atr = trSum / period;
      const lastClose = candles[candles.length-1].close;
      return (atr / lastClose) * 100;
    }

    function calculateEMA(data, period) {
      if (data.length < period) return [];
      const k = 2 / (period + 1);
      let ema = data.slice(0, period).reduce((sum, d) => sum + d.close, 0) / period;
      const result = [{ time: data[period-1].time, value: ema }];
      for (let i = period; i < data.length; i++) {
        ema = data[i].close * k + ema * (1 - k);
        result.push({ time: data[i].time, value: ema });
      }
      return result;
    }

    function calculateChangeForField(candles, intervalMinutes, field) {
      if (!candles || candles.length < 2) return null;
      const last = candles[candles.length-1];
      const targetTime = last.time - intervalMinutes * 60;
      let prev = null;
      for (let i = candles.length-1; i >= 0; i--) {
        if (candles[i].time <= targetTime) {
          prev = candles[i];
          break;
        }
      }
      if (!prev) return null;
      const lastVal = last[field];
      const prevVal = prev[field];
      if (prevVal === 0) return null;
      return ((lastVal - prevVal) / prevVal) * 100;
    }

    const calculateChange = (c, i) => calculateChangeForField(c, i, 'close');
    const calculateVolumeChange = (c, i) => calculateChangeForField(c, i, 'volume');
    const calculateTradesChange = (c, i) => calculateChangeForField(c, i, 'trades');

    // ---------- АДАПТЕРЫ ----------
    class BinanceAdapter {
      constructor() { this.name = 'Binance'; }
      async fetchAllTickers() {
        const res = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr');
        const data = await res.json();
        const result = {};
        data.forEach(t => {
          result[t.symbol] = {
            symbol: t.symbol, exchange: this.name, price: +t.lastPrice,
            change24h: +t.priceChangePercent, volume24h: +t.quoteVolume,
            high24h: +t.highPrice, low24h: +t.lowPrice, tradesCount: t.count,
            lastUpdate: Date.now()
          };
        });
        return result;
      }
      async fetchKlines(symbol, interval, limit=100) {
        const res = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
        const data = await res.json();
        return data.map(d => ({
          time: Math.floor(d[0]/1000), open: +d[1], high: +d[2], low: +d[3], close: +d[4], volume: +d[5], trades: +d[8]
        }));
      }
    }

    class BybitAdapter {
      constructor() { this.name = 'Bybit'; }
      async fetchAllTickers() {
        const res = await fetch('https://api.bybit.com/v5/market/tickers?category=linear');
        const data = await res.json();
        if (data.retCode !== 0 || !data.result?.list) return {};
        const result = {};
        data.result.list.forEach(t => {
          result[t.symbol] = {
            symbol: t.symbol, exchange: this.name, price: +t.lastPrice,
            change24h: parseFloat(t.price24hPcnt) * 100, volume24h: +t.turnover24h,
            high24h: +t.highPrice24h, low24h: +t.lowPrice24h, tradesCount: null,
            lastUpdate: Date.now()
          };
        });
        return result;
      }
      async fetchKlines(symbol, interval, limit=100) {
        const map = {'1m':'1','5m':'5','15m':'15','1h':'60','4h':'240','1d':'D'};
        const intv = map[interval] || interval;
        const res = await fetch(`https://api.bybit.com/v5/market/kline?category=linear&symbol=${symbol}&interval=${intv}&limit=${limit}`);
        const data = await res.json();
        if (data.retCode !== 0 || !data.result?.list) return [];
        return data.result.list.map(d => ({
          time: Math.floor(parseInt(d[0])/1000), open: +d[1], high: +d[2], low: +d[3], close: +d[4], volume: +d[5], trades: null
        })).reverse();
      }
    }

    // ---------- WEBSOCKET СИГНАЛОВ ----------
    class ScreenerWSClient {
      constructor(url, onSignal) {
        this.url = url; this.onSignal = onSignal; this.ws = null; this.connected = false;
        this.connect();
      }
      connect() {
        this.ws = new WebSocket(this.url);
        this.ws.onopen = () => {
          console.log('WS connected'); this.connected = true;
          this.updateStatus('🟢 Скринер подключён');
          this.send({ cmd: 'subscribe', type: 'signal' });
        };
        this.ws.onmessage = (e) => { try { const msg = JSON.parse(e.data); if (msg.type === 'signal_with_chart') this.onSignal(msg); } catch(ex) {} };
        this.ws.onclose = () => { this.connected = false; this.updateStatus('🔴 Скринер отключён'); setTimeout(() => this.connect(), 5000); };
        this.ws.onerror = () => this.updateStatus('⚠️ Ошибка скринера');
      }
      send(data) { if (this.ws && this.ws.readyState === WebSocket.OPEN) this.ws.send(JSON.stringify(data)); }
      updateStatus(text) { document.getElementById('wsStatus').textContent = `🔌 ${text}`; }
    }

    // ---------- МЕНЕДЖЕР ОПОВЕЩЕНИЙ ----------
    class AlertManager {
      constructor(screener) {
        this.screener = screener;
        this.alerts = [];
        this.loadAlerts();
        this.checkInterval = setInterval(() => this.checkAlerts(), 10000);
        this.setupUI();
        Utils.requestNotificationPermission();
      }
      
      loadAlerts() {
        try {
          const stored = localStorage.getItem(CONFIG.alertsStorageKey);
          if (stored) this.alerts = JSON.parse(stored);
        } catch(e) { this.alerts = []; }
        this.updateBadge();
      }
      
      saveAlerts() {
        localStorage.setItem(CONFIG.alertsStorageKey, JSON.stringify(this.alerts));
        this.updateBadge();
      }
      
      updateBadge() {
        const cnt = document.getElementById('alertCount');
        if (cnt) {
          cnt.textContent = this.alerts.length;
          cnt.style.display = this.alerts.length ? 'inline-flex' : 'none';
        }
      }
      
      setupUI() {
        const modal = document.getElementById('alertModal');
        const openBtn = document.getElementById('alertPanelBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const showFormBtn = document.getElementById('showCreateAlertForm');
        const cancelBtn = document.getElementById('cancelCreateBtn');
        const saveBtn = document.getElementById('saveAlertBtn');
        
        openBtn.addEventListener('click', () => {
          modal.style.display = 'flex';
          this.renderAlertList();
          this.populateSymbolSelect();
          document.getElementById('createAlertForm').style.display = 'none';
        });
        closeBtn.addEventListener('click', () => modal.style.display = 'none');
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
        showFormBtn.addEventListener('click', () => {
          document.getElementById('createAlertForm').style.display = 'block';
        });
        cancelBtn.addEventListener('click', () => {
          document.getElementById('createAlertForm').style.display = 'none';
        });
        saveBtn.addEventListener('click', () => this.createAlertFromForm());
      }
      
      populateSymbolSelect() {
        const select = document.getElementById('alertSymbolSelect');
        select.innerHTML = '<option value="__ALL__">🌐 Все пары</option>';
        const tickers = Array.from(this.screener.marketTickers.values());
        tickers.sort((a,b) => a.symbol.localeCompare(b.symbol));
        tickers.forEach(t => {
          const opt = document.createElement('option');
          opt.value = `${t.symbol}:${t.exchange}`;
          opt.textContent = `${t.symbol} (${t.exchange})`;
          select.appendChild(opt);
        });
      }
      
      createAlertFromForm() {
        const symbolKey = document.getElementById('alertSymbolSelect').value;
        const type = document.getElementById('alertTypeSelect').value;
        const operator = document.getElementById('alertOperatorSelect').value;
        const threshold = parseFloat(document.getElementById('alertThresholdInput').value);
        const sound = document.getElementById('alertSoundCheck').checked;
        if (isNaN(threshold)) return alert('Введите числовой порог');
        
        const alert = {
          id: Date.now() + '-' + Math.random().toString(36),
          symbolKey, type, operator, threshold, sound,
          enabled: true,
          lastTriggered: 0
        };
        this.alerts.push(alert);
        this.saveAlerts();
        document.getElementById('createAlertForm').style.display = 'none';
        this.renderAlertList();
        this.populateSymbolSelect();
      }
      
      deleteAlert(id) {
        this.alerts = this.alerts.filter(a => a.id !== id);
        this.saveAlerts();
        this.renderAlertList();
      }
      
      renderAlertList() {
        const container = document.getElementById('alertListContainer');
        if (this.alerts.length === 0) {
          container.innerHTML = '<div style="color:#888; text-align:center; padding:20px;">Нет активных оповещений</div>';
          return;
        }
        container.innerHTML = this.alerts.map(a => {
          let desc = (a.symbolKey === '__ALL__') ? '🌐 Все пары ' : `${a.symbolKey.split(':')[0]} (${a.symbolKey.split(':')[1]}) `;
          if (a.type === 'price') desc += `цена ${a.operator==='above'?'>':'<'} ${a.threshold}`;
          else if (a.type.startsWith('change')) desc += `изм. цены ${a.type.split('_')[1]} ${a.operator==='above'?'↑':'↓'} ${a.threshold}%`;
          else if (a.type === 'volume_24h') desc += `объём 24ч ${a.operator==='above'?'↑':'↓'} ${Utils.formatVolume(a.threshold)}`;
          else if (a.type.startsWith('vol_change')) desc += `рост объёма ${a.type.split('_')[2]} ${a.operator==='above'?'↑':'↓'} ${a.threshold}%`;
          else if (a.type === 'natr') desc += `NATR ${a.operator==='above'?'↑':'↓'} ${a.threshold}%`;
          else if (a.type === 'trades_count') desc += `сделок 24ч ${a.operator==='above'?'↑':'↓'} ${a.threshold}`;
          else if (a.type.startsWith('trades_change')) desc += `рост сделок ${a.type.split('_')[2]} ${a.operator==='above'?'↑':'↓'} ${a.threshold}%`;
          else if (a.type === 'level') desc += `уровень ${a.threshold}`;
          return `<div class="alert-item">
            <div class="alert-item-info">${desc} ${a.sound?'🔊':''}</div>
            <span class="alert-item-remove" data-id="${a.id}">✖</span>
          </div>`;
        }).join('');
        container.querySelectorAll('.alert-item-remove').forEach(el => {
          el.addEventListener('click', (e) => {
            const id = e.target.dataset.id;
            this.deleteAlert(id);
          });
        });
      }
      
      async checkAlerts() {
        if (this.alerts.length === 0) return;
        const tickers = Array.from(this.screener.marketTickers.values());
        
        for (const alert of this.alerts) {
          if (!alert.enabled) continue;
          
          let targets = [];
          if (alert.symbolKey === '__ALL__') {
            targets = tickers.filter(t => this.screener.state.exchange === 'all' || t.exchange === this.screener.state.exchange);
          } else {
            const ticker = this.screener.marketTickers.get(alert.symbolKey);
            if (ticker) targets = [ticker];
          }
          
          for (const ticker of targets) {
            let candles = null;
            const needCandles = alert.type !== 'price' && alert.type !== 'volume_24h' && alert.type !== 'trades_count';
            if (needCandles) {
              const key = `${ticker.symbol}:${ticker.exchange}:${this.screener.state.interval}`;
              candles = this.screener.marketHistory.get(key);
              if (!candles) {
                const adapter = this.screener.marketAdapters.find(a => a.name === ticker.exchange);
                if (adapter) {
                  try {
                    candles = await adapter.fetchKlines(ticker.symbol, this.screener.state.interval, CONFIG.candlesCount);
                    this.screener.marketHistory.set(key, candles);
                  } catch(e) { candles = []; }
                }
              }
            }
            
            let currentValue = null;
            if (alert.type === 'price') currentValue = ticker.price;
            else if (alert.type === 'volume_24h') currentValue = ticker.volume24h;
            else if (alert.type === 'trades_count') currentValue = ticker.tradesCount;
            else if (alert.type === 'natr') currentValue = calculateNATR(candles, CONFIG.natrPeriod);
            else if (alert.type.startsWith('change_')) {
              const period = alert.type.split('_')[1];
              const mins = period === '1m' ? 1 : period === '5m' ? 5 : period === '15m' ? 15 : period === '1h' ? 60 : 1440;
              currentValue = calculateChange(candles, mins);
            }
            else if (alert.type.startsWith('vol_change_')) {
              const period = alert.type.split('_')[2];
              const mins = period === '1m' ? 1 : period === '5m' ? 5 : period === '15m' ? 15 : 60;
              currentValue = calculateVolumeChange(candles, mins);
            }
            else if (alert.type.startsWith('trades_change_')) {
              const period = alert.type.split('_')[2];
              const mins = period === '1m' ? 1 : period === '5m' ? 5 : period === '15m' ? 15 : 60;
              currentValue = calculateTradesChange(candles, mins);
            }
            else if (alert.type === 'level') currentValue = ticker.price;
            
            if (currentValue === null || currentValue === undefined) continue;
            
            let triggered = false;
            if (alert.operator === 'above') triggered = currentValue > alert.threshold;
            else triggered = currentValue < alert.threshold;
            
            if (triggered) {
              const now = Date.now();
              if (now - alert.lastTriggered < 60000) continue;
              alert.lastTriggered = now;
              
              const message = `${ticker.symbol} (${ticker.exchange}) ${alert.operator==='above'?'↑':'↓'} порог ${alert.threshold}. Текущее: ${typeof currentValue === 'number' ? currentValue.toFixed(2) : currentValue}`;
              Utils.showNotification('🔔 Сработало оповещение', message);
              if (alert.sound) Utils.playBeep();
            }
          }
        }
        this.saveAlerts();
      }
      
      quickCreate(symbol, exchange) {
        document.getElementById('alertModal').style.display = 'flex';
        document.getElementById('createAlertForm').style.display = 'block';
        const select = document.getElementById('alertSymbolSelect');
        const value = `${symbol}:${exchange}`;
        for (let opt of select.options) if (opt.value === value) opt.selected = true;
        this.renderAlertList();
      }
    }

    // ---------- ПУЛ ГРАФИКОВ ----------
    class ChartPool {
      constructor() { this.active = new Map(); }
      acquire(container) {
        if (this.active.has(container)) return this.active.get(container);
        const chart = LightweightCharts.createChart(container, {
          width: container.clientWidth, height: CONFIG.chartHeight,
          layout: { background: { color: '#141414' }, textColor: '#888' },
          grid: { vertLines: { visible: false }, horzLines: { visible: true, color: '#222' } },
          timeScale: { visible: true, borderColor: '#2a2a2a' },
          crosshair: { mode: 0 }
        });
        const series = chart.addCandlestickSeries({
          upColor: '#00c853', downColor: '#ff5252', borderVisible: false,
          wickUpColor: '#00c853', wickDownColor: '#ff5252'
        });
        const ema20 = chart.addLineSeries({ color: '#ffb300', lineWidth: 1, lastValueVisible: false, priceLineVisible: false });
        const ema50 = chart.addLineSeries({ color: '#00bcd4', lineWidth: 1, lastValueVisible: false, priceLineVisible: false });
        const obj = { chart, series, ema20, ema50 };
        this.active.set(container, obj);
        return obj;
      }
      clear() { for (let [_, obj] of this.active) obj.chart.remove(); this.active.clear(); }
    }

    // ---------- ОСНОВНОЙ СКРИНЕР ----------
    class CryptoScreener {
      constructor() {
        this.marketAdapters = [new BinanceAdapter(), new BybitAdapter()];
        this.marketTickers = new Map();
        this.marketHistory = new Map();
        this.signals = new Map();
        this.pool = new ChartPool();
        this.metricsCache = new Map();
        
        const saved = Utils.loadSettings();
        this.state = { 
          filter: 'all', exchange: 'all', interval: saved.interval || CONFIG.defaultInterval,
          sortBy: saved.sortBy || 'default', sortDir: saved.sortDir || 'desc',
          limit: saved.limit || 100, minVolume: saved.minVolume || 1000000,
          displayPeriod: 'all', gridCols: saved.gridCols || 'auto'
        };
        
        this.elements = {
          grid: document.getElementById('gridContainer'),
          marketStatus: document.getElementById('marketStatus'),
          filterBtns: document.querySelectorAll('.filter-btn'),
          intervalSelect: document.getElementById('intervalSelect'),
          exchangeSelect: document.getElementById('exchangeSelect'),
          sortSelect: document.getElementById('sortSelect'),
          sortDirSelect: document.getElementById('sortDirSelect'),
          limitSelect: document.getElementById('limitSelect'),
          minVolumeSelect: document.getElementById('minVolumeSelect'),
          refreshBtn: document.getElementById('refreshBtn'),
          periodBtns: document.querySelectorAll('.period-btn'),
          gridColsSelect: document.getElementById('gridColsSelect'),
          counts: {
            all: document.getElementById('count-all'), market: document.getElementById('count-market'),
            signals: document.getElementById('count-signals'), gainers: document.getElementById('count-gainers'),
            losers: document.getElementById('count-losers'), volume: document.getElementById('count-volume')
          }
        };
        
        this.elements.intervalSelect.value = this.state.interval;
        this.elements.exchangeSelect.value = this.state.exchange;
        this.elements.sortSelect.value = this.state.sortBy;
        this.elements.sortDirSelect.value = this.state.sortDir;
        this.elements.limitSelect.value = this.state.limit;
        this.elements.minVolumeSelect.value = this.state.minVolume;
        this.elements.gridColsSelect.value = this.state.gridCols;
        this.applyGridCols(this.state.gridCols);
        
        this.alertManager = new AlertManager(this);
        this.init();
      }
      
      applyGridCols(cols) {
        const container = this.elements.grid;
        if (cols === 'auto') {
          container.style.setProperty('--grid-cols', 'repeat(auto-fill, minmax(340px, 1fr))');
        } else {
          container.style.setProperty('--grid-cols', `repeat(${cols}, 1fr)`);
        }
      }
      
      async init() {
        this.bindEvents();
        this.wsClient = new ScreenerWSClient(CONFIG.wsUrl, s => { this.handleIncomingSignal(s); });
        await this.loadMarketData();
      }
      
      bindEvents() {
        this.elements.filterBtns.forEach(btn => btn.addEventListener('click', e => {
          this.elements.filterBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          this.state.filter = btn.dataset.filter;
          this.renderGrid();
        }));
        this.elements.intervalSelect.addEventListener('change', async e => {
          this.state.interval = e.target.value; this.marketHistory.clear(); this.metricsCache.clear();
          Utils.saveSettings({ ...this.state });
          await this.renderGrid();
        });
        this.elements.exchangeSelect.addEventListener('change', e => {
          this.state.exchange = e.target.value; Utils.saveSettings({ ...this.state }); this.renderGrid();
        });
        this.elements.sortSelect.addEventListener('change', e => {
          this.state.sortBy = e.target.value; Utils.saveSettings({ ...this.state }); this.renderGrid();
        });
        this.elements.sortDirSelect.addEventListener('change', e => {
          this.state.sortDir = e.target.value; Utils.saveSettings({ ...this.state }); this.renderGrid();
        });
        this.elements.limitSelect.addEventListener('change', e => {
          this.state.limit = parseInt(e.target.value); Utils.saveSettings({ ...this.state }); this.renderGrid();
        });
        this.elements.minVolumeSelect.addEventListener('change', e => {
          this.state.minVolume = parseInt(e.target.value); Utils.saveSettings({ ...this.state }); this.renderGrid();
        });
        this.elements.refreshBtn.addEventListener('click', async () => {
          this.elements.marketStatus.textContent = '⏳ Обновление...';
          this.marketTickers.clear();
          this.metricsCache.clear();
          await this.loadMarketData();
        });
        this.elements.periodBtns.forEach(btn => {
          btn.addEventListener('click', () => {
            this.elements.periodBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.state.displayPeriod = btn.dataset.period;
            this.rerenderMetrics();
          });
        });
        this.elements.gridColsSelect.addEventListener('change', e => {
          const cols = e.target.value;
          this.state.gridCols = cols;
          Utils.saveSettings({ ...this.state });
          this.applyGridCols(cols);
          // Перерисовка не требуется, сетка адаптируется автоматически
        });
        window.addEventListener('resize', Utils.debounce(() => {
          this.pool.active.forEach(obj => obj.chart.applyOptions({ width: obj.chart._container.clientWidth }));
        }, 200));
      }
      
      async loadMarketData() {
        try {
          const promises = this.marketAdapters.map(async adapter => {
            try {
              const tickers = await adapter.fetchAllTickers();
              Object.values(tickers).forEach(t => {
                const key = `${t.symbol}:${t.exchange}`;
                this.marketTickers.set(key, t);
              });
            } catch(e) { console.warn(`Ошибка ${adapter.name}:`, e); }
          });
          await Promise.all(promises);
          this.elements.marketStatus.textContent = `✅ Загружено ${this.marketTickers.size} тикеров`;
          this.updateCounts();
          await this.renderGrid();
          this.alertManager.populateSymbolSelect();
        } catch(e) {
          this.elements.marketStatus.textContent = '❌ Ошибка загрузки';
        }
      }
      
      handleIncomingSignal(signal) {
        const basic = signal.basic || {};
        const id = signal.id || `${basic.symbol}_${basic.exchange}_${basic.strategy}_${Date.now()}`;
        this.signals.set(id, signal);
        this.updateCounts();
        if (this.shouldDisplaySignal(signal)) this.renderGrid();
      }
      
      shouldDisplaySignal(signal) {
        const basic = signal.basic;
        if (this.state.exchange !== 'all' && basic.exchange !== this.state.exchange) return false;
        const filter = this.state.filter;
        return filter === 'all' || filter === 'signals' || (filter === 'market' ? false : false);
      }
      
      shouldDisplayMarket(ticker) {
        if (this.state.exchange !== 'all' && ticker.exchange !== this.state.exchange) return false;
        if (ticker.volume24h < this.state.minVolume) return false;
        const filter = this.state.filter;
        if (filter === 'signals') return false;
        if (filter === 'all' || filter === 'market') return true;
        if (filter === 'gainers') return ticker.change24h >= 3;
        if (filter === 'losers') return ticker.change24h <= -3;
        if (filter === 'volume') return ticker.volume24h > 1e7;
        return true;
      }
      
      updateCounts() {
        const marketItems = Array.from(this.marketTickers.values()).filter(t => t.volume24h >= this.state.minVolume);
        const signalItems = Array.from(this.signals.values());
        this.elements.counts.all.textContent = marketItems.length + signalItems.length;
        this.elements.counts.market.textContent = marketItems.length;
        this.elements.counts.signals.textContent = signalItems.length;
        this.elements.counts.gainers.textContent = marketItems.filter(t => t.change24h > 0).length;
        this.elements.counts.losers.textContent = marketItems.filter(t => t.change24h < 0).length;
        this.elements.counts.volume.textContent = marketItems.filter(t => t.volume24h > 1e7).length;
      }
      
      async getMetricsForTicker(ticker) {
        const cacheKey = `${ticker.symbol}:${ticker.exchange}:${this.state.interval}`;
        const cached = this.metricsCache.get(cacheKey);
        if (cached && (Date.now() - cached.timestamp) < CONFIG.metricsCacheTime) {
          return cached.data;
        }
        
        const key = `${ticker.symbol}:${ticker.exchange}:${this.state.interval}`;
        let candles = this.marketHistory.get(key);
        if (!candles) {
          const adapter = this.marketAdapters.find(a => a.name === ticker.exchange);
          if (adapter) {
            try { candles = await adapter.fetchKlines(ticker.symbol, this.state.interval, CONFIG.candlesCount); this.marketHistory.set(key, candles); } catch(e) { candles = []; }
          }
        }
        
        const metrics = {};
        if (candles && candles.length) {
          metrics.natr = calculateNATR(candles, CONFIG.natrPeriod);
          metrics.change1m = calculateChange(candles, 1);
          metrics.change5m = calculateChange(candles, 5);
          metrics.change15m = calculateChange(candles, 15);
          metrics.change1h = calculateChange(candles, 60);
          metrics.volChange1m = calculateVolumeChange(candles, 1);
          metrics.volChange5m = calculateVolumeChange(candles, 5);
          metrics.volChange15m = calculateVolumeChange(candles, 15);
          metrics.volChange1h = calculateVolumeChange(candles, 60);
          metrics.tradesChange1m = calculateTradesChange(candles, 1);
          metrics.tradesChange5m = calculateTradesChange(candles, 5);
          metrics.tradesChange15m = calculateTradesChange(candles, 15);
          metrics.tradesChange1h = calculateTradesChange(candles, 60);
        }
        this.metricsCache.set(cacheKey, { data: metrics, timestamp: Date.now() });
        return metrics;
      }
      
      async renderGrid() {
        this.pool.clear();
        this.elements.grid.innerHTML = '<div class="loading"><div class="spinner"></div>Обновление...</div>';
        
        let items = [];
        for (let ticker of this.marketTickers.values()) {
          if (this.shouldDisplayMarket(ticker)) items.push({ type: 'market', data: ticker });
        }
        for (let [id, signal] of this.signals.entries()) {
          if (this.shouldDisplaySignal(signal)) items.push({ type: 'signal', data: signal, id });
        }
        
        if (items.length === 0) {
          this.elements.grid.innerHTML = '<div class="loading">Нет данных</div>';
          return;
        }
        
        if (this.state.sortBy !== 'default' && this.state.sortBy !== 'volume' && this.state.sortBy !== 'trades' && this.state.sortBy !== 'change24h') {
          await Promise.all(items.filter(i => i.type === 'market').map(i => this.getMetricsForTicker(i.data).then(m => i.data._metrics = m)));
        }
        
        items = await this.sortItems(items);
        items = items.slice(0, this.state.limit);
        
        this.elements.grid.innerHTML = '';
        for (let item of items) {
          if (item.type === 'market') {
            const card = this.createMarketCard(item.data);
            this.elements.grid.appendChild(card);
            await this.loadMarketChart(card, item.data);
            const metrics = await this.getMetricsForTicker(item.data);
            this.updateMarketCardFooter(card, item.data, metrics);
          } else {
            const card = this.createSignalCard(item.data, item.id);
            this.elements.grid.appendChild(card);
            await this.loadSignalChart(card, item.data);
          }
        }
      }
      
      rerenderMetrics() {
        document.querySelectorAll('.chart-card:not(.signal-card)').forEach(card => {
          const symbolEl = card.querySelector('.chart-symbol');
          if (!symbolEl) return;
          const symbolText = symbolEl.childNodes[0].nodeValue.trim();
          const exchangeEl = card.querySelector('.chart-exchange');
          const exchange = exchangeEl ? exchangeEl.textContent : '';
          const key = `${symbolText}USDT:${exchange}`;
          const ticker = this.marketTickers.get(key);
          if (ticker) {
            this.getMetricsForTicker(ticker).then(metrics => {
              this.updateMarketCardFooter(card, ticker, metrics);
            });
          }
        });
      }
      
      async sortItems(items) {
        const sortBy = this.state.sortBy;
        const dir = this.state.sortDir === 'desc' ? -1 : 1;
        if (sortBy === 'default') {
          items.sort((a, b) => {
            if (a.type === 'signal' && b.type === 'market') return -1;
            if (a.type === 'market' && b.type === 'signal') return 1;
            if (a.type === 'signal') return (b.data.timestamp||0) - (a.data.timestamp||0);
            return Math.abs(b.data.change24h) - Math.abs(a.data.change24h);
          });
          return items;
        }
        const getValue = (item) => {
          if (item.type === 'signal') {
            const m = item.data.metrics?.market_context || {};
            if (sortBy === 'volume') return m.volume_24h_usdt || 0;
            if (sortBy === 'change24h') return m.change_24h_pct || 0;
            return 0;
          }
          const t = item.data;
          const m = t._metrics || {};
          switch (sortBy) {
            case 'volume': return t.volume24h;
            case 'trades': return t.tradesCount || 0;
            case 'change24h': return t.change24h;
            case 'change1h': return m.change1h ?? -999;
            case 'change15m': return m.change15m ?? -999;
            case 'change5m': return m.change5m ?? -999;
            case 'change1m': return m.change1m ?? -999;
            case 'volChange1m': return m.volChange1m ?? -999;
            case 'volChange5m': return m.volChange5m ?? -999;
            case 'volChange15m': return m.volChange15m ?? -999;
            case 'volChange1h': return m.volChange1h ?? -999;
            case 'tradesChange1m': return m.tradesChange1m ?? -999;
            case 'tradesChange5m': return m.tradesChange5m ?? -999;
            case 'tradesChange15m': return m.tradesChange15m ?? -999;
            case 'tradesChange1h': return m.tradesChange1h ?? -999;
            case 'natr': return m.natr ?? 0;
            default: return 0;
          }
        };
        items.sort((a, b) => { const va = getValue(a), vb = getValue(b); return va === vb ? 0 : (va > vb ? 1 : -1) * dir; });
        return items;
      }
      
      createMarketCard(ticker) {
        const card = document.createElement('div');
        card.className = 'chart-card';
        const pos = ticker.change24h >= 0;
        card.innerHTML = `
          <div class="chart-header">
            <div class="chart-symbol">${ticker.symbol.replace('USDT','')}<span class="chart-exchange">${ticker.exchange}</span></div>
            <div>
              <div class="chart-price ${pos?'positive':'negative'}">${Utils.formatPrice(ticker.price)}</div>
              <div class="chart-change ${pos?'positive':'negative'}">${Utils.formatChange(ticker.change24h)}</div>
            </div>
          </div>
          <div class="chart-body"></div>
          <div class="chart-footer"></div>
        `;
        const header = card.querySelector('.chart-header');
        const alertBtn = document.createElement('span');
        alertBtn.style.cursor = 'pointer';
        alertBtn.style.marginLeft = '8px';
        alertBtn.innerHTML = '🔔';
        alertBtn.title = 'Создать оповещение';
        alertBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          this.alertManager.quickCreate(ticker.symbol, ticker.exchange);
        });
        header.querySelector('.chart-symbol').appendChild(alertBtn);
        return card;
      }
      
      updateMarketCardFooter(card, ticker, metrics) {
        const footer = card.querySelector('.chart-footer');
        const displayPeriod = this.state.displayPeriod;
        
        const makeBadge = (label, value, isPositive) => {
          if (value === null || value === undefined) return '';
          const cls = `metric-badge ${isPositive ? 'positive' : 'negative'}`;
          return `<span class="${cls}" title="${label}">${value.toFixed(2)}%</span>`;
        };
        
        let badgesHtml = `<span>📊 ${Utils.formatVolume(ticker.volume24h)}</span>`;
        
        const periods = ['1m', '5m', '15m', '1h'];
        const priceChanges = { '1m': metrics.change1m, '5m': metrics.change5m, '15m': metrics.change15m, '1h': metrics.change1h };
        const volChanges = { '1m': metrics.volChange1m, '5m': metrics.volChange5m, '15m': metrics.volChange15m, '1h': metrics.volChange1h };
        const tradesChanges = { '1m': metrics.tradesChange1m, '5m': metrics.tradesChange5m, '15m': metrics.tradesChange15m, '1h': metrics.tradesChange1h };
        
        if (displayPeriod === 'all') {
          periods.forEach(p => {
            const v = priceChanges[p];
            if (v != null) badgesHtml += makeBadge(`Цена ${p}`, v, v >= 0);
          });
          periods.forEach(p => {
            const v = volChanges[p];
            if (v != null) badgesHtml += makeBadge(`Объём ${p}`, v, v >= 0);
          });
          if (ticker.tradesCount) badgesHtml += `<span class="metric-badge" title="Сделки 24ч">🔄 ${Utils.formatNumber(ticker.tradesCount)}</span>`;
          periods.forEach(p => {
            const v = tradesChanges[p];
            if (v != null) badgesHtml += makeBadge(`Сделки ${p}`, v, v >= 0);
          });
          if (metrics.natr != null) badgesHtml += `<span class="metric-badge tooltip" title="NATR (14)">📉 ${metrics.natr.toFixed(2)}%</span>`;
        } else {
          const p = displayPeriod;
          const vPrice = priceChanges[p];
          const vVol = volChanges[p];
          const vTrades = tradesChanges[p];
          if (vPrice != null) badgesHtml += makeBadge(`Цена ${p}`, vPrice, vPrice >= 0);
          if (vVol != null) badgesHtml += makeBadge(`Объём ${p}`, vVol, vVol >= 0);
          if (vTrades != null) badgesHtml += makeBadge(`Сделки ${p}`, vTrades, vTrades >= 0);
          if (metrics.natr != null) badgesHtml += `<span class="metric-badge tooltip" title="NATR (14)">📉 ${metrics.natr.toFixed(2)}%</span>`;
        }
        
        footer.innerHTML = badgesHtml;
      }
      
      createSignalCard(signal, id) {
        const basic = signal.basic, metrics = signal.metrics || {}, conf = metrics.confidence || {};
        const confScore = conf.score || 0, confLevel = conf.level || 'medium';
        let confClass = confLevel === 'high' ? 'confidence-high' : confLevel === 'low' ? 'confidence-low' : 'confidence-medium';
        const card = document.createElement('div');
        card.className = 'chart-card signal-card';
        card.dataset.signalId = id;
        const direction = basic.direction === 'up' ? 'positive' : 'negative';
        const price = basic.price || 0;
        const changePct = metrics.market_context?.change_24h_pct || 0;
        const pos = changePct >= 0;
        card.innerHTML = `
          <div class="chart-header">
            <div>
              <div class="chart-symbol">${basic.symbol}<span class="chart-exchange">${basic.exchange}</span><span class="signal-badge">🎯 ${basic.strategy||'SIGNAL'}</span></div>
              <div style="font-size:11px; margin-top:4px;"><span class="${confClass} confidence"></span>${confLevel} (${confScore.toFixed(1)}/10)</div>
            </div>
            <div>
              <div class="chart-price ${direction}">${Utils.formatPrice(price)}</div>
              <div class="chart-change ${pos?'positive':'negative'}">${Utils.formatChange(changePct)}</div>
            </div>
          </div>
          <div class="chart-body"></div>
          <div class="chart-footer">
            <span>📊 ${Utils.formatVolume(metrics.market_context?.volume_24h_usdt || 0)}</span>
          </div>
        `;
        return card;
      }
      
      async loadMarketChart(card, ticker) {
        const container = card.querySelector('.chart-body');
        try {
          const { series, ema20, ema50 } = this.pool.acquire(container);
          const key = `${ticker.symbol}:${ticker.exchange}:${this.state.interval}`;
          let candles = this.marketHistory.get(key);
          if (!candles) {
            const adapter = this.marketAdapters.find(a => a.name === ticker.exchange);
            if (adapter) candles = await adapter.fetchKlines(ticker.symbol, this.state.interval, CONFIG.candlesCount);
            this.marketHistory.set(key, candles);
          }
          if (candles && candles.length) {
            series.setData(candles);
            const ema20Data = calculateEMA(candles, 20);
            const ema50Data = calculateEMA(candles, 50);
            ema20.setData(ema20Data);
            ema50.setData(ema50Data);
          } else throw new Error('Empty');
        } catch(e) {
          container.innerHTML = '<div style="color:#666;text-align:center;padding-top:60px;">⚠️ Нет данных</div>';
        }
      }
      
      async loadSignalChart(card, signal) {
        const container = card.querySelector('.chart-body');
        try {
          const { series, ema20, ema50 } = this.pool.acquire(container);
          const chart = signal.chart;
          if (chart?.candles?.length) {
            series.setData(chart.candles);
            const ema20Data = calculateEMA(chart.candles, 20);
            const ema50Data = calculateEMA(chart.candles, 50);
            ema20.setData(ema20Data);
            ema50.setData(ema50Data);
          } else throw new Error('No chart');
        } catch(e) {
          container.innerHTML = '<div style="color:#666;text-align:center;padding-top:60px;">⚠️ Нет графика</div>';
        }
      }
    }

    window.addEventListener('DOMContentLoaded', () => new CryptoScreener());
  })();
</script>
